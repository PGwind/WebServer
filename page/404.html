<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Echo</title>
    <style>
        :root {
            --bg: #f6f9fd;
            --surface: rgba(255, 255, 255, 0.94);
            --text: #1c2633;
            --muted: #67798f;
            --accent: #2f6fed;
            --line: rgba(47, 111, 237, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
            display: grid;
            place-items: center;
            padding: 24px;
            color: var(--text);
            background:
                radial-gradient(circle at top, rgba(47, 111, 237, 0.1), transparent 28%),
                linear-gradient(180deg, #fcfdff 0%, var(--bg) 100%);
        }

        .wrap {
            width: min(720px, 100%);
            padding: 42px 34px;
            border-radius: 30px;
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: 0 24px 64px rgba(60, 88, 130, 0.12);
            text-align: center;
        }

        .code {
            margin: 0;
            font-size: clamp(72px, 16vw, 150px);
            line-height: 0.92;
            letter-spacing: -0.08em;
            color: #162131;
        }

        h1 {
            margin: 16px 0 10px;
            font-size: clamp(28px, 5vw, 42px);
        }

        p {
            margin: 0 auto;
            max-width: 520px;
            line-height: 1.8;
            color: var(--muted);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 144px;
            padding: 14px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 14px 28px rgba(47, 111, 237, 0.22);
        }

        .btn-secondary {
            background: #fff;
            color: var(--accent);
            border: 1px solid var(--line);
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <main class="wrap">
        <p class="code">404</p>
        <h1>页面没有找到</h1>
        <p>你访问的内容可能已经移动、删除，或者输入了一个不存在的地址。可以返回首页，或者直接前往 Echo 的博客继续浏览。</p>
        <div class="actions">
            <a class="btn btn-primary" href="/page/">返回首页</a>
            <a class="btn btn-secondary" href="https://liveout.cn/" target="_blank" rel="noopener noreferrer">访问博客</a>
        </div>
    </main>
</body>
</html>
