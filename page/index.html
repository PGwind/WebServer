<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <style>
        :root {
            --bg: #f7f9fc;
            --bg-soft: #eef3f9;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-strong: #ffffff;
            --text: #1f2a37;
            --muted: #607086;
            --accent: #2f6fed;
            --accent-soft: #eaf2ff;
            --line: rgba(47, 111, 237, 0.12);
            --shadow: 0 24px 64px rgba(60, 88, 130, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "PingFang SC", "Helvetica Neue", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(47, 111, 237, 0.1), transparent 30%),
                linear-gradient(180deg, #fbfdff 0%, var(--bg) 48%, var(--bg-soft) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
        }

        .card {
            width: min(960px, 100%);
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: 30px;
            overflow: hidden;
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .hero {
            padding: 44px 34px 26px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(241, 246, 255, 0.96)),
                linear-gradient(180deg, #fff, #fff);
            border-bottom: 1px solid rgba(47, 111, 237, 0.08);
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 13px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(42px, 9vw, 80px);
            line-height: 0.95;
            letter-spacing: -0.05em;
            color: #182230;
        }

        .hero p {
            margin: 14px 0 0;
            max-width: 600px;
            font-size: 17px;
            line-height: 1.75;
            color: var(--muted);
        }

        .content {
            display: grid;
            grid-template-columns: 290px 1fr;
            gap: 28px;
            padding: 30px 34px 34px;
        }

        .profile {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .avatar {
            width: 172px;
            height: 172px;
            border-radius: 26px;
            object-fit: cover;
            border: 6px solid rgba(255, 255, 255, 0.95);
            box-shadow: 0 18px 40px rgba(72, 102, 145, 0.16);
        }

        .note {
            margin: 0;
            padding: 17px 18px;
            border-radius: 20px;
            background: var(--surface-strong);
            border: 1px solid var(--line);
            color: var(--muted);
            line-height: 1.75;
        }

        .links {
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 20px 22px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line);
            text-decoration: none;
            color: inherit;
            box-shadow: 0 12px 28px rgba(86, 110, 146, 0.07);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .link-card:hover {
            transform: translateY(-3px);
            border-color: rgba(47, 111, 237, 0.25);
            box-shadow: 0 16px 34px rgba(86, 110, 146, 0.12);
        }

        .label {
            margin: 0 0 6px;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #7b8ca3;
        }

        .title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            color: #17212f;
        }

        .arrow {
            flex: 0 0 auto;
            width: 46px;
            height: 46px;
            border-radius: 999px;
            display: grid;
            place-items: center;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 20px;
            font-weight: 700;
        }

        @media (max-width: 760px) {
            body {
                padding: 18px;
            }

            .content {
                grid-template-columns: 1fr;
                padding: 22px 22px 24px;
            }

            .hero {
                padding: 30px 22px 20px;
            }

            .avatar {
                width: 132px;
                height: 132px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <section class="hero">
            <p class="eyebrow">Personal Landing Page</p>
            <h1>Echo</h1>
            <p>这里整理了个人主页、内容账号和代码仓库入口。整体改成了浅白主题，更适合拿来做静态导航页或者项目演示首页。</p>
        </section>

        <section class="content">
            <aside class="profile">
                <img class="avatar" src="https://liveout.cn/usr/uploads/pic/icon1.jpg" alt="Echo avatar">
                <p class="note">部署后访问 <strong>/page/</strong> 就能打开这个页面。它适合作为当前 WebServer 的默认展示页或个人入口页。</p>
            </aside>

            <div class="links">
                <a class="link-card" href="https://liveout.cn/" target="_blank" rel="noopener noreferrer">
                    <div>
                        <p class="label">Blog</p>
                        <p class="title">博客</p>
                    </div>
                    <span class="arrow">↗</span>
                </a>

                <a class="link-card" href="https://space.bilibili.com/137469404?spm_id_from=333.33.0.0" target="_blank" rel="noopener noreferrer">
                    <div>
                        <p class="label">Bilibili</p>
                        <p class="title">BiliBili</p>
                    </div>
                    <span class="arrow">↗</span>
                </a>

                <a class="link-card" href="https://github.com" target="_blank" rel="noopener noreferrer">
                    <div>
                        <p class="label">GitHub</p>
                        <p class="title">GitHub</p>
                    </div>
                    <span class="arrow">↗</span>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
